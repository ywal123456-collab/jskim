<main class="app-content" id="main" data-jskim-spec-screen="wizard-complete">
        
<section class="page-intro">
  <h1>完了</h1>
  <p class="lead">
    画面遷移 sample の完了画面です。
  </p>
</section>

<ol class="wizard-steps" aria-label="申込手順">
  <li
    class="wizard-steps__item is-complete"
    
  >
    <span class="wizard-steps__number">1</span>
    <span class="wizard-steps__label">情報入力</span>
    
      <span class="wizard-steps__state">完了</span>
    
  </li>
  <li
    class="wizard-steps__item is-complete"
    
  >
    <span class="wizard-steps__number">2</span>
    <span class="wizard-steps__label">入力内容確認</span>
    
      <span class="wizard-steps__state">完了</span>
    
  </li>
  <li
    class="wizard-steps__item is-current"
    aria-current="step"
  >
    <span class="wizard-steps__number">3</span>
    <span class="wizard-steps__label">完了</span>
    
      <span class="wizard-steps__state">現在</span>
    
  </li>
</ol>


<section class="complete-panel" aria-labelledby="wizard-complete-heading" data-jskim-spec-item="complete-message">
  <p class="complete-panel__mark" aria-hidden="true">OK</p>
  <h2 id="wizard-complete-heading">画面遷移が完了しました</h2>
  <p>
    この画面は静的 UI sample です。
    入力内容の送信および保存は行われていません。
  </p>
  <p>
    入力画面の内容は引き継がれておらず、API 通信も含まれていません。
  </p>
</section>

<section class="page-nav" aria-label="完了後の移動">
  <a class="button" href="input.html" data-jskim-spec-item="restart-wizard" data-jskim-spec-action="restart-wizard">最初から確認する</a>
  <a class="button button--secondary" href="../index.html" data-jskim-spec-item="back-to-portal" data-jskim-spec-action="back-to-portal">Portal へ戻る</a>
</section>

      </main>
