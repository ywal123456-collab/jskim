<main class="app-content" id="main" data-jskim-spec-screen="wizard-input">
        
<section class="page-intro">
  <h1>情報入力</h1>
  <p class="lead">
    3 ステップ申込画面の入力ステップ構成を確認する静的 UI sample です。
  </p>
</section>

<ol class="wizard-steps" aria-label="申込手順">
  <li class="wizard-steps__item is-current" aria-current="step">
    <span class="wizard-steps__number">1</span>
    <span class="wizard-steps__label">情報入力</span>
    
      <span class="wizard-steps__state">現在</span>
    
  </li>
  <li class="wizard-steps__item">
    <span class="wizard-steps__number">2</span>
    <span class="wizard-steps__label">入力内容確認</span>
    
      <span class="wizard-steps__state">未実施</span>
    
  </li>
  <li class="wizard-steps__item">
    <span class="wizard-steps__number">3</span>
    <span class="wizard-steps__label">完了</span>
    
      <span class="wizard-steps__state">未実施</span>
    
  </li>
</ol>


<section class="notice notice--info" aria-label="静的 UI の案内">
  <h2 class="notice__title">静的 UI sample について</h2>
  <p>
    この画面は静的 UI sample です。
    入力内容の保存、画面間の引き継ぎおよび送信処理は行いません。
  </p>
</section>

<section class="panel" aria-labelledby="wizard-input-heading">
  <div class="panel__header">
    <h2 id="wizard-input-heading">入力フォーム（見た目のみ）</h2>
  </div>
  <div class="form-grid">
    <div class="form-field" data-jskim-spec-item="applicant-name">
      <label for="wizard-name">氏名</label>
      <input id="wizard-name" name="name" type="text" value="" readonly="">
    </div>
    <div class="form-field" data-jskim-spec-item="applicant-email">
      <label for="wizard-email">メールアドレス</label>
      <input id="wizard-email" name="email" type="text" value="" readonly="">
    </div>
    <div class="form-field" data-jskim-spec-item="applicant-phone">
      <label for="wizard-phone">電話番号</label>
      <input id="wizard-phone" name="phone" type="text" value="" readonly="">
    </div>
    <div class="form-field" data-jskim-spec-item="inquiry-category">
      <label for="wizard-category">お問い合わせ種別</label>
      <select id="wizard-category" name="category" disabled="">
        <option selected="">商品について</option>
        <option>配送について</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-field form-field--full" data-jskim-spec-item="inquiry-message">
      <label for="wizard-message">お問い合わせ内容</label>
      <textarea id="wizard-message" name="message" rows="4" readonly=""></textarea>
    </div>
  </div>
</section>

<section class="page-nav" aria-label="入力操作">
  <a class="button button--secondary" href="../index.html" data-jskim-spec-item="back-to-portal" data-jskim-spec-action="back-to-portal">Portal へ戻る</a>
  <a class="button" href="confirm.html" data-jskim-spec-item="go-to-confirm" data-jskim-spec-action="go-to-confirm">入力内容を確認する</a>
</section>

      </main>
